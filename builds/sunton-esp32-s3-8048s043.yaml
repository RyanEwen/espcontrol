# =============================================================================
# BUILD PROFILE - Sunton ESP32-8048S043 (4.3" landscape)
# =============================================================================
# CI/local build entry point for the 800x480 landscape ESP32-S3 panel.
# Bundles the matching web UI so branch/release builds do not load the shared
# GitHub Pages copy from main.
# =============================================================================

substitutions:
  cover_art_placeholder_file: "../common/assets/cover_art_placeholder.svg"
  name: "espcontrol-8048s043"
  friendly_name: "Sunton ESP32-8048S043"
  espcontrol_component_url: "file:///config"
  mdi_font_file: "/config/common/assets/fonts/materialdesignicons-webfont-7.4.47.ttf"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/sunton-esp32-s3-8048s043/packages.yaml

wifi:
  # Compile-only station credentials for CI/local builds. User-imported
  # deployed configs supply their real WiFi credentials in device YAML.
  ssid: "ESPControl"
  password: "espcontrol"
  ap:
    ssid: "${friendly_name}"

captive_portal:

web_server:
  js_url: ""
  js_include: "../docs/public/webserver/www.js"
