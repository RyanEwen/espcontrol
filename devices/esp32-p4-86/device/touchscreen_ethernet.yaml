# =============================================================================
# TOUCHSCREEN - Ethernet firmware variant
# =============================================================================
# GPIO28 is reserved by Ethernet RMII on ESP32-P4, so Ethernet builds must not
# claim the GT911 reset line.
# =============================================================================

i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    i2c_id: bus_a
    on_touch:
      - script.execute: cover_art_pause_after_touch
      - script.wait: cover_art_pause_after_touch
      # Touches on the screensaver's agenda overlay (or inside the agenda
      # view above it) open/use the agenda view instead of waking.
      - if:
          condition:
            lambda: |-
              int32_t x = touch.x, y = touch.y;
              id(main_lvgl).rotate_coordinates(x, y);
              return !espcontrol::agenda_touch_blocks_wake(x, y);
          then:
            - script.execute: screensaver_wake
