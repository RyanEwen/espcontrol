# =============================================================================
# FONTS - Generic style IDs for the 800x480 landscape display
# =============================================================================
# Feature YAML should reference these functional style IDs, not physical font
# names or sizes. Sizes remain device-specific behind the same style names.
#
# Grid and body faces track the Guition JC4880P443, the 6-slot panel this
# device mirrors, trimmed slightly for its shorter cells. The cover-art faces
# stay smaller: this screen puts its title and artist in a ~280px side panel
# rather than across a full-width square.
# =============================================================================

font:
  # Main action/setup icons
  - file: '${mdi_font_file}'
    id: font_icon_main
    size: 58
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Smaller card icons
  - file: '${mdi_font_file}'
    id: font_icon_card
    size: 44
    bpp: 4
    glyphs: !include ../../../common/assets/climate_card_icon_glyphs.yaml

  # Status, network, and subpage icons
  - file: '${mdi_font_file}'
    id: font_icon_status
    size: 26
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # Main labels and setup body text
  - file: "gfonts://Roboto"
    id: font_text_body
    size: 27
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Smaller secondary text
  - file: "gfonts://Roboto"
    id: font_text_small
    size: 23
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Headings and media titles
  - file: "gfonts://Roboto@Light"
    id: font_text_title
    size: 46
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver title
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_title
    size: 56
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media control modal title
  - file: "gfonts://Roboto@Light"
    id: font_media_control_title
    size: 48
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver artist
  - file: "gfonts://Roboto@Light"
    id: font_cover_art_artist
    size: 30
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Media cover-art screensaver elapsed time
  - file: "gfonts://Roboto"
    id: font_cover_art_time
    size: 22
    bpp: 4
    glyphs: " 0123456789:/-"

  # Normal sensor values
  - file: "gfonts://Roboto@Light"
    id: font_number_value
    size: 56
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
      - " dhms"

  # Large sensor values
  - file: "gfonts://Roboto@Thin"
    id: font_number_value_large
    size: 130
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
