# =============================================================================
# DEVICE - Sunton ESP32-8048S043 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4.3" 800x480
# landscape panel. Includes the ESP32-S3 SoC (native WiFi), MIPI RGB display,
# GT911 capacitive touchscreen, and backlight PWM.
#
# The same board layout is shared with the 5" ESP32-8048S050; both drive an
# 800x480 RGB panel from an identical pin map, which is why the upstream
# ESP32-8048S050 model is used here verbatim.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/jtenniswood/espcontrol"
  espcontrol_component_ref: "main"
  mdi_font_file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # The S3 display stack leaves little internal RAM for HTTPS OTA checks.
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Keep the ESP32 task watchdog long enough for display startup while
      # remaining compatible with ESPHome 2026.4 and newer.
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      # Keep WiFi startup inside the internal-RAM budget after the RGB display
      # and LVGL buffers are initialized. The 800x480 frame buffer is roughly
      # 67% larger than on the 480x480 panels, so this headroom matters more.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      # Keep RGB panel scan-out stable during flash writes and recover display
      # timing at VSYNC when the ESP-IDF RGB driver needs to restart the panel.
      CONFIG_LCD_RGB_RESTART_IN_VSYNC: "y"
      CONFIG_LCD_RGB_ISR_IRAM_SAFE: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # Widen the data cache line. Scan-out reads the frame buffer from PSRAM
      # continuously, and with the 32-byte default it makes far more PSRAM round
      # trips than at 480x480; the LCD FIFO underruns and the panel flickers.
      # Raising the cache to 64KB helps further but costs 32KB of internal SRAM
      # this panel does not have - it starves the web server until it can no
      # longer send the UI bundle. The line size is free.
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol, web_server_idf, artwork_image, mipi_rgb]
    refresh: 1s

espcontrol:
  id: espcontrol_app

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and MIPI RGB display fails to reinitialize
# peripherals after a software reset. A brief deep sleep forces a full
# hardware reset on wake, equivalent to a power cycle. The on_boot
# handler catches USB-triggered and software-triggered resets (the
# latter fired by the "Apply Configuration" restart button); the OTA
# on_end hook catches wireless updates.
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  build_flags:
    - "-DESPCONTROL_MAX_GRID_SLOTS=6"
    # Keep C++ literals close to their functions on the S3 firmware image;
    # the modal code is large enough to otherwise trip Xtensa l32r range limits.
    - "-mtext-section-literals"
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_SW) {
              esp_ota_img_states_t ota_state;
              const esp_partition_t *running = esp_ota_get_running_partition();
              if (running != nullptr &&
                  esp_ota_get_state_partition(running, &ota_state) == ESP_OK &&
                  ota_state == ESP_OTA_IMG_PENDING_VERIFY) {
                ESP_LOGI("s3_reset", "Marking OTA image valid before hardware-reset workaround");
                id(sunton_8048s043_safe_mode).mark_successful();
                global_preferences->sync();
                esp_sleep_enable_timer_wakeup(100000);
                esp_deep_sleep_start();
                return;
              }
            }
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: -100
      then:
        - lambda: 'id(screen_rotation_ready) = true;'
        - script.execute: apply_screen_rotation
        - script.execute: clock_bar_apply

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed
  - platform: http_request
    on_begin:
      then:
        - script.execute: show_update_writing
        - script.wait: show_update_writing
    on_end:
      then:
        - globals.set:
            id: firmware_update_complete_pending
            value: 'true'
        - lambda: 'global_preferences->sync();'
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
    on_error:
      then:
        - script.execute: show_update_failed

safe_mode:
  id: sunton_8048s043_safe_mode
  boot_is_good_after: 10s

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# The S3 panel runs close to the internal RAM limit once the RGB display,
# LVGL, web UI, and API are all active. Keep the native API connection pool
# modest, but allow one spare slot so Home Assistant can reconnect after an
# abrupt OTA reset while the ESPHome dashboard/logger still has a socket open.
# Give the send queue extra headroom so reconnect bursts and compact Home
# Assistant action responses do not drop the API connection on this low-memory
# panel.
api:
  listen_backlog: 4
  max_connections: 3
  max_send_queue: 12

# The 8048S043 exposes its USB port through a CH340 USB-UART bridge on UART0.
# GPIO19/20 are the S3 native USB pins but are wired to the I2C touch bus here,
# so USB_SERIAL_JTAG stops working once the application starts.
logger:
  hardware_uart: UART0

wifi:
  use_psram: true

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO2
    id: gpio_backlight_pwm
    # The Sunton backlight stage is a plain transistor driver and is happy at a
    # high PWM rate, which keeps the panel free of visible shimmer.
    frequency: 1220Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                auto now = panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now());
                return (id(espcontrol_app).display().target_source_is(
                            espcontrol::DisplayRequestSource::SCREEN_SCHEDULE) &&
                        id(espcontrol_app).display().target_mode_is(
                            espcontrol::DisplayMode::DISPLAY_OFF)) ||
                       screen_schedule_waiting_for_time(
                         id(screen_schedule_trigger).state,
                         id(schedule_enabled).state,
                         now.is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: |-
                      return id(espcontrol_app).display().current_mode_is(
                          espcontrol::DisplayMode::DISPLAY_OFF);
                  then:
                    - script.execute: screensaver_wake
    on_turn_off:
      then:
        - script.execute: display_backlight_handle_off

button:
  - platform: template
    name: Backlight Sweep Test
    internal: true
    disabled_by_default: true
    entity_category: diagnostic
    icon: mdi:brightness-percent
    web_server:
      sorting_group_id: sg_brightness
    on_press:
      then:
        - script.execute: s3_backlight_sweep_test

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO19
  scl: GPIO20

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    update_interval: 16ms
    transform:
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: cover_art_pause_after_touch
      - script.wait: cover_art_pause_after_touch
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4.3" 800x480 MIPI RGB panel)
# ---------------------------------------------------------------------------
# The ESP32-8048S050 model carries the exact pin map and porch timings this
# board uses, and needs no SPI init sequence. GPIO47/48 are RGB data lines
# here, so no SPI bus is defined.
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: ESP32-8048S050
    id: my_display
    # Start WiFi before the RGB panel allocates its frame buffers; otherwise the
    # WiFi driver can fail to claim enough internal RX buffers on fresh boots.
    setup_priority: 240
    # Below the 16MHz model default: the larger 800x480 frame buffer leaves less
    # PSRAM bandwidth for WiFi, flash, and web traffic. 14MHz is a rate these
    # panels are already known to scan cleanly at.
    pclk_frequency: 14MHz
    update_interval: never
    auto_clear_enabled: False

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  # Keep LVGL after WiFi and after the display driver.
  setup_priority: 230
  # A full-frame draw buffer (800x480x2 = 768KB, in PSRAM). At 12% LVGL
  # renders and flushes in roughly eight horizontal bands, visible as a
  # top-to-bottom sweep on every redraw.
  buffer_size: 100%
  displays: my_display
  rotation: 0
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: s3_backlight_sweep_test
    mode: restart
    then:
      - script.execute: screensaver_wake
      - script.wait: screensaver_wake
      - light.turn_on:
          id: display_backlight
          brightness: 100%
          transition_length: 0s
      - delay: 3s
      - light.turn_on:
          id: display_backlight
          brightness: 60%
          transition_length: 0s
      - delay: 3s
      - light.turn_on:
          id: display_backlight
          brightness: 30%
          transition_length: 0s
      - delay: 3s
      - light.turn_on:
          id: display_backlight
          brightness: 10%
          transition_length: 0s
      - delay: 3s
      - light.turn_on:
          id: display_backlight
          brightness: 100%
          transition_length: 0s

  # This panel is mounted the right way up, so the selected rotation maps
  # straight through to LVGL with no display offset.
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "${entity_screen_rotation}"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screen_rotation_ready);'
            then:
              - script.execute: apply_screen_rotation
              # Subpage grids are built for the current column count, so they
              # need rebuilding too - rotating swaps 3x2 for 2x3 and the
              # subpages otherwise keep the old geometry.
              - script.execute: refresh_button_grid
              - script.execute: clock_bar_apply
