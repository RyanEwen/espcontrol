# =============================================================================
# FONTS - Generic UI font styles for the 1060x470 display
# =============================================================================
# Every device exposes the same generic font IDs so feature YAML can reuse
# them without knowing each panel's physical font size.
# =============================================================================

font:
  # Main icons: buttons, setup, modals, and climate cards
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_main
    size: 55
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Small status and subpage icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: font_icon_status
    size: 19
    bpp: 4
    glyphs: !include ../../../common/assets/network_status_glyphs.yaml

  # General UI text: labels, setup body, modal labels, and climate options
  - file: "gfonts://Roboto"
    id: font_text_body
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Titles and setup headings
  - file: "gfonts://Roboto@Light"
    id: font_text_title
    size: 43
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Normal sensor values
  - file: "gfonts://Roboto@Light"
    id: font_number_value
    size: 55
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large-card sensor values
  - file: "gfonts://Roboto@Thin"
    id: font_number_value_large
    size: 138
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"

  # Large modal numbers
  - file: "gfonts://Roboto@Thin"
    id: font_number_modal
    size: 120
    bpp: 4
    glyphs:
      - "0123456789.-°/%"
      - ":"
